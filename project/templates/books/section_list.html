{% extends "base.html" %}

{% block content %}
<div class="center-panel">
	<h2>Sections</h2>
	<hr>
	<div class="list-controls">
		<a href="{% url 'section-add' %}"><i class="bi bi-plus-circle"></i> Add</a>
	</div>
	{% if object_list %}
	<ul class="list">
		{% for section in object_list %}
			<li>{{ section.name }}
				 <div  class="list-controls">
				 	<a href="{%url 'section-delete' section.id %}"><i class="bi bi-trash"></i></a>
					<a href="{%url 'section-update' section.id %}"><i class="bi bi-pencil-square"></i></a>
		         </div>
		    </li>
		{% endfor %}
	{% endif %}
	</ul>
</div>
{% endblock content %}
